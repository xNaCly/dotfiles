# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        colors = true
        interval = 1
}

#order += "ipv6"
#order += "wireless _first_"
#order += "ethernet _first_"
#order += "disk /"
#order += "load"
order += "cpu_usage"
order += "memory"
#order += "battery all"
order += "volume master"
order += "tztime local"

wireless _first_ {
        format_up = "直 %essid"
        format_down = "睊 "
}

ethernet _first_ {
        format_up = "E: %ip (%speed)"
        format_down = "E: down"
}

battery all {
        format = "%status %percentage"
        status_chr = ""
        status_bat = ""
        status_unk = ""
        status_full = ""
        low_threshold = 25
}

disk "/" {
        format = "%avail"
}

load {
        format = "%1min"
}

memory {
        format = " %used"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = " %d-%m-%Y %H:%M:%S "
}

cpu_usage {
        format = " %usage"
}

volume master {
        format = " %volume"
        format_muted = " --%"
        device = "pulse"
}

